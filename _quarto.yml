project: 
  type: book
  output-dir: docs
  
bibliography: references.bib

book:
  title: 基礎物理
  subtitle: 微積分などを勉強して高校物理を履修する方のために
  author:
    - name: Serika Yuzuki
      affiliations:
        - name: University of Tokyo
    - name: Akina
      affiliations: 
        - name: Hokkaido University
  date: "3/2/2023"
  chapters:
    - index.qmd
    - source/intro.qmd
    - source/velocity.qmd
    - source/newton-mechanics.qmd
    - source/energy.qmd
    - source/various-forces.qmd
    - source/database.qmd

format: 
  titlepage-pdf:
    latex-engine: lualatex
    documentclass: ltjsbook
    classoption:
      - lualatex
      - ja=standard
      - b5paper
    number-sections: true
    toc: true
    titlepage: "bg-image"
    titlepage-bg-image: "img/corner-bg.png"
    titlepage-logo: "img/logo.png"
    titlepage-header: "The Publisher"
    titlepage-footer: |
      [https://github.com/SerikaYuzuki](https://github.com/SerikaYuzuki)
    coverpage-include-file:
      - tex/copyright.tex
    titlepage-include-file:
      - tex/dedication.tex
    coverpage: "great-wave"
    coverpage-title: "基礎物理"
    coverpage-footer: "Serika Yuzuki, Akina"
    include-in-header:
      text: |
          % カスタムなスタイルファイルを読み込む
          \usepackage{sty/boxes}
          \usepackage{sty/anss}
          \usepackage{sty/physdiag}

          % 物理学の数式を簡単に書くためのパッケージ
          \usepackage{physics}

          \usepackage{tikz}
          \usetikzlibrary { decorations.pathmorphing, decorations.pathreplacing, decorations.shapes, quotes, angles, patterns, calc, arrows.meta, angles, quotes }
          \usepackage{pgfplots}
          \pgfplotsset{compat=1.18}

          % すべての数式をディスプレイスタイルで表示する
          \everymath{\displaystyle}

          % 図をテキストの周りに配置するためのパッケージ
          \usepackage{wrapfig}
          